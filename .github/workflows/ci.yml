name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - run: npx biome check --reporter=github .

      - run: npm run build -w client

      - run: node --check server/server.js
